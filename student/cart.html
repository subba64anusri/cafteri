<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cart · Cafteri</title>
<link rel="stylesheet" href="../public/css/canteen.css">
<style>
  :root {
    --accent: #1f8a57;
    --accent-dark: #176e45;
    --accent-soft: rgba(31, 138, 87, 0.12);
  }

  body { overflow-x: hidden; }
  .ticket-rail { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 16px; background: var(--ink); }
  .ticket-rail__brand { white-space: nowrap; }
  .ticket-rail__actions { display: flex; gap: 12px; align-items: center; }

  .profile-wrap { position: relative; display: inline-block; }
  .profile-btn {
    background: rgba(250, 247, 240, 0.1);
    border: 1px solid rgba(250, 247, 240, 0.15);
    color: var(--paper);
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 16px; transition: all 0.2s ease;
  }
  .profile-btn:hover { background: rgba(250, 247, 240, 0.2); border-color: var(--accent); }

  .profile-modal {
    position: fixed; inset: 0; background: rgba(0, 0, 0, 0.6);
    z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px;
  }
  .profile-card-popup {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--radius-lg); width: 100%; max-width: 360px;
    padding: 28px 24px; box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    position: relative; text-align: center;
  }
  .profile-card-popup__close { position: absolute; top: 14px; right: 16px; background: none; border: none; font-size: 18px; cursor: pointer; color: var(--muted); }
  .profile-card-popup__avatar {
    width: 60px; height: 60px; background: var(--accent-soft); color: var(--accent-dark);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-size: 28px; margin: 0 auto 16px;
  }
  .profile-card-popup h3 { font-size: 20px; margin-bottom: 4px; }
  .profile-card-popup p { font-size: 14px; color: var(--muted); margin-bottom: 24px; word-break: break-all; }

  .total-bar { display: flex; align-items: center; justify-content: space-between; padding: 22px 24px; margin-top: 18px; flex-wrap: wrap; gap: 16px; }
  .total-bar__label { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
  .total-bar__value { font-family: var(--font-mono); font-size: 26px; font-weight: 700; }

  .qty-btn { width: 28px; height: 28px; padding: 0; border-radius: var(--radius-sm); border: 1px solid var(--line); background: var(--surface); font-weight: 700; cursor: pointer; }
  .qty-inline { display: inline-flex; align-items: center; gap: 10px; }

  .table-wrapper { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* Payment confirmation overlay — shown after Razorpay Checkout's success
     handler fires, while we poll the server waiting for the webhook to
     actually confirm the payment and create the order. */
  .payment-wait-overlay {
    position: fixed; inset: 0; background: rgba(250, 247, 240, 0.92);
    z-index: 2100; display: none; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; text-align: center; padding: 20px;
  }
  .payment-wait-overlay__spinner {
    width: 40px; height: 40px; border-radius: 50%;
    border: 4px solid var(--accent-soft); border-top-color: var(--accent);
    animation: payment-spin 0.8s linear infinite;
  }
  @keyframes payment-spin { to { transform: rotate(360deg); } }
  .payment-wait-overlay__title { font-size: 17px; font-weight: 700; }
  .payment-wait-overlay__sub { font-size: 14px; color: var(--muted); max-width: 320px; }

  @media (max-width: 580px) {
    .ticket-rail__actions .btn-sm { padding: 6px 8px; font-size: 12px; }
  }
  @media (max-width: 480px) {
    .total-bar { flex-direction: column; align-items: flex-start; }
    .total-bar .btn { width: 100%; }
  }
</style>
</head>
<body>

<div class="ticket-rail">
  <div class="ticket-rail__brand">🍽️ Cafteri <span class="ticket-rail__role" id="canteenNameBadge"></span></div>
  <div class="ticket-rail__actions">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">Menu</a>
    <a href="orders.html" class="btn btn-ghost btn-sm">My Orders</a>

    <div class="profile-wrap">
      <button class="profile-btn" id="profileModalTrigger" title="View Profile">👤</button>
    </div>
  </div>
</div>

<div class="profile-modal" id="profileOverlayContainer">
  <div class="profile-card-popup">
    <button class="profile-card-popup__close" id="profileCloseBtn">&times;</button>
    <div class="profile-card-popup__avatar">👤</div>
    <h3 id="displayProfileName">Customer Account</h3>
    <p id="displayProfileEmail">loading session…</p>
    <button class="btn btn-danger btn-block" id="logoutBtn">Logout</button>
  </div>
</div>

<!-- Shown while we wait for the Razorpay webhook to confirm payment and
     create the real order, after Checkout's own success handler fires. -->
<div class="payment-wait-overlay" id="paymentWaitOverlay">
  <div class="payment-wait-overlay__spinner"></div>
  <div class="payment-wait-overlay__title" id="paymentWaitTitle">Confirming your payment…</div>
  <div class="payment-wait-overlay__sub" id="paymentWaitSub">This usually takes just a few seconds. Please don't close this page.</div>
</div>

<div class="shell">
  <div class="shell__header">
    <div>
      <div class="eyebrow" id="canteenEyebrow">Before you order</div>
      <h1>Your Cart</h1>
    </div>
  </div>

  <div class="table-wrapper">
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th>Price</th>
          <th>Qty</th>
          <th>Total</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="cartTableBody"></tbody>
    </table>
  </div>

  <div class="card card--accent total-bar">
    <div>
      <div class="total-bar__label">Total payable</div>
      <div class="total-bar__value" id="totalValue">₹0</div>
    </div>
    <button class="btn btn-primary" id="checkoutBtn" onclick="checkout()">Place order</button>
  </div>
</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/shared.js"></script>
<!-- Razorpay Checkout script — needed to open the payment popup. -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script>
const currentUser = Session.getStudent();
const myCanteen = Session.getSelectedCanteen();

if (!currentUser) {
  window.location.href = 'login.html';
}
if (!myCanteen) {
  window.location.href = 'select_canteen.html';
}

document.getElementById('canteenNameBadge').textContent = myCanteen ? myCanteen.name : '';
document.getElementById('canteenEyebrow').textContent = myCanteen ? `Ordering from ${myCanteen.name}` : 'Before you order';

document.getElementById('displayProfileEmail').textContent = currentUser;
if (currentUser && currentUser.includes('@')) {
  const accountPrefixName = currentUser.split('@')[0];
  document.getElementById('displayProfileName').textContent = accountPrefixName.charAt(0).toUpperCase() + accountPrefixName.slice(1);
}

const profileTrigger = document.getElementById('profileModalTrigger');
const profileOverlay = document.getElementById('profileOverlayContainer');
const profileClose = document.getElementById('profileCloseBtn');

profileTrigger.addEventListener('click', () => { profileOverlay.style.display = 'flex'; });
profileClose.addEventListener('click', () => { profileOverlay.style.display = 'none'; });
profileOverlay.addEventListener('click', (e) => { if (e.target === profileOverlay) profileOverlay.style.display = 'none'; });

function getCartKey() {
  return `cart_${currentUser}_${myCanteen.id}`;
}

function loadCart() {
  return JSON.parse(localStorage.getItem(getCartKey()) || '[]');
}

function saveCart(cart) {
  localStorage.setItem(getCartKey(), JSON.stringify(cart));
}

function refreshCart() {
  const cart = loadCart();
  const tbody = document.getElementById('cartTableBody');
  const totalValue = document.getElementById('totalValue');
  const checkoutBtn = document.getElementById('checkoutBtn');

  if (cart.length === 0) {
    tbody.innerHTML = `<tr><td colspan="5" style="text-align:center; padding: 40px;" class="text-muted">Your cart is empty. <a href="dashboard.html" style="color:var(--accent-dark); font-weight:600;">Browse the menu →</a></td></tr>`;
    totalValue.textContent = formatRupees(0);
    checkoutBtn.disabled = true;
    return;
  }

  checkoutBtn.disabled = false;
  let total = 0;

  tbody.innerHTML = cart.map(item => {
    const itemTotal = item.price * item.cartQuantity;
    total += itemTotal;
    return `
      <tr>
        <td>${escapeHtml(item.name)}</td>
        <td class="price-cell">${formatRupees(item.price)}</td>
        <td>
          <div class="qty-inline">
            <button class="qty-btn" data-change="${item._id}" data-delta="-1">−</button>
            <span class="qty-cell">${item.cartQuantity}</span>
            <button class="qty-btn" data-change="${item._id}" data-delta="1">+</button>
          </div>
        </td>
        <td class="price-cell">${formatRupees(itemTotal)}</td>
        <td><button class="btn btn-outline btn-sm" data-remove="${item._id}">Remove</button></td>
      </tr>`;
  }).join('');

  totalValue.textContent = formatRupees(total);

  tbody.querySelectorAll('[data-change]').forEach(btn => {
    btn.addEventListener('click', () => updateQty(btn.dataset.change, Number(btn.dataset.delta)));
  });
  tbody.querySelectorAll('[data-remove]').forEach(btn => {
    btn.addEventListener('click', () => removeItem(btn.dataset.remove));
  });
}

function updateQty(id, delta) {
  let cart = loadCart();
  const item = cart.find(i => i._id === id);
  if (item) {
    item.cartQuantity += delta;
    if (item.cartQuantity <= 0) {
      cart = cart.filter(i => i._id !== id);
    }
  }
  saveCart(cart);
  refreshCart();
}

function removeItem(id) {
  let cart = loadCart();
  cart = cart.filter(i => i._id !== id);
  saveCart(cart);
  refreshCart();
}

// ---------------------------------------------------------------------------
// Payment-wait overlay helpers
// ---------------------------------------------------------------------------
const paymentWaitOverlay = document.getElementById('paymentWaitOverlay');
const paymentWaitTitle = document.getElementById('paymentWaitTitle');
const paymentWaitSub = document.getElementById('paymentWaitSub');

function showPaymentWait(title, sub) {
  paymentWaitTitle.textContent = title;
  paymentWaitSub.textContent = sub;
  paymentWaitOverlay.style.display = 'flex';
}

function hidePaymentWait() {
  paymentWaitOverlay.style.display = 'none';
}

// Polls GET /api/payment/status/:razorpayOrderId every 2s until the
// webhook has confirmed the payment (status becomes 'paid' or 'failed'),
// or until ~30s have passed without an answer.
function pollPaymentStatus(razorpayOrderId) {
  const POLL_INTERVAL_MS = 2000;
  const MAX_ATTEMPTS = 15; // ~30 seconds total
  let attempts = 0;

  return new Promise((resolve, reject) => {
    const tick = async () => {
      attempts += 1;
      try {
        const result = await apiFetch(`/api/payment/status/${razorpayOrderId}`);

        if (result.status === 'paid') {
          resolve(result);
          return;
        }
        if (result.status === 'failed') {
          reject(new Error(result.failureReason || 'Payment failed.'));
          return;
        }
        // still 'pending'
        if (attempts >= MAX_ATTEMPTS) {
          reject(new Error('Payment confirmation is taking longer than expected.'));
          return;
        }
        setTimeout(tick, POLL_INTERVAL_MS);
      } catch (err) {
        if (attempts >= MAX_ATTEMPTS) {
          reject(err);
          return;
        }
        setTimeout(tick, POLL_INTERVAL_MS);
      }
    };

    tick();
  });
}

// ---------------------------------------------------------------------------
// Checkout — now opens Razorpay instead of posting straight to /api/orders.
// The actual order is only created server-side once the Razorpay webhook
// confirms the payment; this function just kicks that flow off and waits.
// ---------------------------------------------------------------------------
async function checkout() {
  const cart = loadCart();
  if (cart.length === 0) {
    showToast('Your cart is empty.', 'error');
    return;
  }

  const checkoutBtn = document.getElementById('checkoutBtn');
  checkoutBtn.disabled = true;
  checkoutBtn.textContent = 'Opening payment…';

  let paymentSetup;
  try {
    paymentSetup = await apiFetch('/api/payment/create-order', {
      method: 'POST',
      body: JSON.stringify({ studentEmail: currentUser, items: cart, canteenId: myCanteen.id })
    });
  } catch (err) {
    showToast(err.message, 'error');
    checkoutBtn.disabled = false;
    checkoutBtn.textContent = 'Place order';
    return;
  }

  const razorpayOptions = {
    key: paymentSetup.keyId,
    amount: paymentSetup.amount,
    currency: paymentSetup.currency,
    order_id: paymentSetup.razorpayOrderId,
    name: 'Cafteri',
    description: myCanteen.name ? `Order at ${myCanteen.name}` : 'Canteen order',
    prefill: { email: currentUser },
    notes: { studentEmail: currentUser, canteenId: myCanteen.id },
    theme: { color: '#1f8a57' },

    // Fires once Razorpay's own popup confirms the card/UPI/etc payment
    // went through on their end. The actual order is NOT created yet —
    // we still wait for the webhook (server-to-server) to confirm and
    // write the order, which is the only thing that's trusted.
    handler: function (response) {
      showPaymentWait('Confirming your payment…', "This usually takes just a few seconds. Please don't close this page.");

      pollPaymentStatus(paymentSetup.razorpayOrderId)
        .then((result) => {
          saveCart([]);
          showToast(`Order placed! Your token is #${result.orderToken}.`);
          window.location.href = 'orders.html';
        })
        .catch((err) => {
          hidePaymentWait();
          showToast(
            `Payment received but order confirmation is delayed: ${err.message}. Check "My Orders" shortly — your cart has been kept just in case.`,
            'error'
          );
          checkoutBtn.disabled = false;
          checkoutBtn.textContent = 'Place order';
        });
    },

    modal: {
      // Fires if the student closes the Razorpay popup without paying.
      ondismiss: function () {
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = 'Place order';
      }
    }
  };

  try {
    const rzp = new Razorpay(razorpayOptions);
    rzp.on('payment.failed', function (response) {
      showToast(response.error && response.error.description ? response.error.description : 'Payment failed.', 'error');
      checkoutBtn.disabled = false;
      checkoutBtn.textContent = 'Place order';
    });
    rzp.open();
    checkoutBtn.textContent = 'Place order';
  } catch (err) {
    showToast('Could not open the payment window. Please try again.', 'error');
    checkoutBtn.disabled = false;
    checkoutBtn.textContent = 'Place order';
  }
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  Session.clearStudent();
  window.location.href = 'login.html';
});

refreshCart();
</script>
</body>
</html>
