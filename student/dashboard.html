<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu · Cafteri</title>
<link rel="stylesheet" href="../public/css/canteen.css">
<style>
  :root {
    --accent: #1f8a57;
    --accent-dark: #176e45;
    --accent-soft: rgba(31, 138, 87, 0.12);
  }

  body {
    overflow-x: hidden;
  }

  .ticket-rail {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--ink);
  }

  .ticket-rail__brand {
    white-space: nowrap;
  }

  .ticket-rail__actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* Profile Avatar and Dropdown UI Panel */
  .profile-wrap {
    position: relative;
    display: inline-block;
  }

  .profile-btn {
    background: rgba(250, 247, 240, 0.1);
    border: 1px solid rgba(250, 247, 240, 0.15);
    color: var(--paper);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s ease;
  }

  .profile-btn:hover {
    background: rgba(250, 247, 240, 0.2);
    border-color: var(--accent);
  }

  .profile-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .profile-card-popup {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 360px;
    padding: 28px 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    position: relative;
    text-align: center;
  }

  .profile-card-popup__close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
  }

  .profile-card-popup__avatar {
    width: 60px;
    height: 60px;
    background: var(--accent-soft);
    color: var(--accent-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
  }

  .profile-card-popup h3 {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .profile-card-popup p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
    word-break: break-all;
  }

  .food-card {
    padding: 22px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    position: relative;
  }

  .fav-btn {
    position: absolute;
    top: 15px;
    right: 15px;
    background: transparent;
    border: none;
    font-size: 20px;
    cursor: pointer;
    padding: 0;
    line-height: 1;
    z-index: 10;
    user-select: none;
  }

  .food-card h3 {
    font-size: 17px;
    padding-right: 25px;
  }

  .food-card__price {
    font-family: var(--font-mono);
    font-weight: 700;
    font-size: 18px;
    color: var(--accent-dark);
    margin: 4px 0 2px;
  }

  .food-card__stock {
    font-size: 12.5px;
    color: var(--muted);
    margin-bottom: 14px;
  }

  .food-card__stock.is-low {
    color: #b3531f;
    font-weight: 600;
  }

  .food-card__stock.is-out {
    color: var(--danger-dark);
    font-weight: 600;
  }

  .qty-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    margin-top: auto;
  }

  .qty-btn {
    width: 34px;
    height: 34px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--surface);
    font-weight: 700;
    font-size: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .qty-btn:hover { border-color: var(--accent); }
  .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .qty-value {
    font-family: var(--font-mono);
    font-weight: 700;
    min-width: 24px;
    text-align: center;
  }

  .cart-fab-wrap { position: relative; }

  .cart-badge {
    position: absolute;
    top: -8px;
    right: -8px;
    background: var(--danger);
    color: white;
    border-radius: 50%;
    min-width: 19px;
    height: 19px;
    font-size: 11px;
    font-weight: 700;
    display: none;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
  }

  .grid-loading {
    height: 150px;
  }

  /* Enhanced Responsive Category Navigation Layout styling overrides */
  .category-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    width: 100%;
  }

  @media (max-width: 580px) {
    .ticket-rail__actions {
      gap: 6px;
    }
    .ticket-rail__actions .btn-sm {
      padding: 6px 8px;
      font-size: 12px;
    }
  }

  @media (max-width: 480px) {
    .category-tabs {
      overflow-x: auto;
      white-space: nowrap;
      padding-bottom: 10px;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .category-tabs::-webkit-scrollbar {
      display: none;
    }
    .category-tab {
      padding: 8px 16px;
      flex: 0 0 auto;
    }
    .shell__header {
      margin-bottom: 12px;
    }
  }
</style>
</head>
<body>

<div class="ticket-rail">
  <div class="ticket-rail__brand">🍽️ Cafteri <span class="ticket-rail__role">Student</span></div>
  <div class="ticket-rail__actions">
    <button id="toggleFavsViewBtn" class="btn btn-ghost btn-sm">❤️ Fav </button>
    <div class="cart-fab-wrap">
      <a href="cart.html" class="btn btn-ghost btn-sm">Cart</a>
      <span id="cartBadge" class="cart-badge">0</span>
    </div>
    <a href="orders.html" class="btn btn-ghost btn-sm">My Orders</a>
    
    <div class="profile-wrap">
      <button class="profile-btn" id="profileModalTrigger" title="View Profile">👤</button>
    </div>
  </div>
</div>

<div class="profile-modal" id="profileOverlayContainer">
  <div class="profile-card-popup">
    <button class="profile-card-popup__close" id="profileCloseBtn">&times;</button>
    <div class="profile-card-popup__avatar">👤</div>
    <h3 id="displayProfileName">Student Account</h3>
    <p id="displayProfileEmail">loading-session@college.edu</p>
    <button class="btn btn-danger btn-block" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="shell">
  <div class="shell__header">
    <div>
      <div class="eyebrow">What looks good today?</div>
      <h1 id="categoryTitle">Tiffins</h1>
    </div>
  </div>

  <div class="category-tabs" id="categoryTabs"></div>

  <div class="grid grid--auto" id="menuGrid">
    <div class="card skeleton grid-loading"></div>
    <div class="card skeleton grid-loading"></div>
    <div class="card skeleton grid-loading"></div>
  </div>
</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/shared.js"></script>
<script>
const CATEGORIES = ['Tiffins', 'Meals', 'Drinks', 'Snacks', 'Desserts'];
const currentUser = localStorage.getItem('loggedInUserEmail');
if (!currentUser) {
  window.location.href = 'login.html';
}

// Map profile fields into view containers
document.getElementById('displayProfileEmail').textContent = currentUser;
if (currentUser.includes('@')) {
  const accountPrefixName = currentUser.split('@')[0];
  document.getElementById('displayProfileName').textContent = accountPrefixName.charAt(0).toUpperCase() + accountPrefixName.slice(1);
}

// Modal interactivity listeners
const profileTrigger = document.getElementById('profileModalTrigger');
const profileOverlay = document.getElementById('profileOverlayContainer');
const profileClose = document.getElementById('profileCloseBtn');

profileTrigger.addEventListener('click', () => {
  profileOverlay.style.display = 'flex';
});

profileClose.addEventListener('click', () => {
  profileOverlay.style.display = 'none';
});

profileOverlay.addEventListener('click', (e) => {
  if (e.target === profileOverlay) {
    profileOverlay.style.display = 'none';
  }
});

function getCartKey() {
  return `cart_${currentUser}`;
}

function getFavsKey() {
  return `favs_${currentUser}`;
}

let cart = JSON.parse(localStorage.getItem(getCartKey()) || '[]');
let favorites = JSON.parse(localStorage.getItem(getFavsKey()) || '{}');
let currentCategory = 'Tiffins';
let menuCache = [];
let showFavoritesOnly = false;

function renderTabs() {
  const tabs = document.getElementById('categoryTabs');
  tabs.innerHTML = CATEGORIES.map(cat => `
    <button class="category-tab ${cat === currentCategory ? 'is-active' : ''}" data-cat="${cat}">${cat}</button>
  `).join('');

  tabs.querySelectorAll('.category-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentCategory = btn.dataset.cat;
      document.getElementById('categoryTitle').textContent = currentCategory;
      renderTabs();
      fetchMenu(currentCategory);
    });
  });
}

function updateCartUI() {
  const totalItems = cart.reduce((sum, item) => sum + item.cartQuantity, 0);
  const badge = document.getElementById('cartBadge');
  if (totalItems > 0) {
    badge.textContent = totalItems;
    badge.style.display = 'flex';
  } else {
    badge.style.display = 'none';
  }
  localStorage.setItem(getCartKey(), JSON.stringify(cart));
}

function stockLabel(item) {
  if (item.quantity <= 0) return { text: 'Out of stock', cls: 'is-out' };
  if (item.quantity <= 5) return { text: `Only ${item.quantity} left`, cls: 'is-low' };
  return { text: `${item.quantity} available`, cls: '' };
}

function renderMenu() {
  const grid = document.getElementById('menuGrid');

  let itemsToRender = menuCache;
  if (showFavoritesOnly) {
    const currentFavs = favorites[currentCategory] || [];
    itemsToRender = menuCache.filter(item => currentFavs.includes(item._id));
  }

  if (itemsToRender.length === 0) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state__icon">🍽️</div>
        <div class="empty-state__title">Nothing here yet</div>
        <p class="text-muted">No items in ${escapeHtml(currentCategory)} right now. Check back soon.</p>
      </div>`;
    return;
  }

  if (!favorites[currentCategory]) {
    favorites[currentCategory] = [];
  }

  grid.innerHTML = itemsToRender.map(item => {
    const cartItem = cart.find(i => i._id === item._id);
    const quantity = cartItem ? cartItem.cartQuantity : 0;
    const stock = stockLabel(item);
    const outOfStock = item.quantity <= 0;
    const atMax = quantity >= item.quantity;
    
    const isFav = favorites[currentCategory].includes(item._id);

    return `
      <div class="card card--accent food-card" id="card-${item._id}">
        <button class="fav-btn" data-fav="${item._id}">
          ${isFav ? '❤️' : '🤍'}
        </button>

        <h3>${escapeHtml(item.name)}</h3>
        <div class="food-card__price">${formatRupees(item.price)}</div>
        <div class="food-card__stock ${stock.cls}">${stock.text}</div>

        ${quantity === 0
          ? `<button class="btn btn-primary btn-block" ${outOfStock ? 'disabled' : ''} data-add="${item._id}">
               ${outOfStock ? 'Sold out' : 'Add to cart'}
             </button>`
          : `<div class="qty-row">
               <button class="qty-btn" data-change="${item._id}" data-delta="-1">−</button>
               <span class="qty-value">${quantity}</span>
               <button class="qty-btn" data-change="${item._id}" data-delta="1" ${atMax ? 'disabled' : ''}>+</button>
             </div>`
        }
      </div>`;
  }).join('');

  grid.querySelectorAll('[data-add]').forEach(btn => {
    btn.addEventListener('click', () => addToCart(btn.dataset.add));
  });
  grid.querySelectorAll('[data-change]').forEach(btn => {
    btn.addEventListener('click', () => changeQuantity(btn.dataset.change, Number(btn.dataset.delta)));
  });
  
  grid.querySelectorAll('[data-fav]').forEach(btn => {
    btn.addEventListener('click', () => toggleFavorite(btn.dataset.fav));
  });
}

function toggleFavorite(id) {
  if (!favorites[currentCategory]) {
    favorites[currentCategory] = [];
  }

  const index = favorites[currentCategory].indexOf(id);
  if (index > -1) {
    favorites[currentCategory].splice(index, 1);
  } else {
    favorites[currentCategory].push(id);
  }

  localStorage.setItem(getFavsKey(), JSON.stringify(favorites));
  renderMenu();
}

document.getElementById('toggleFavsViewBtn').addEventListener('click', () => {
  showFavoritesOnly = !showFavoritesOnly;
  const btn = document.getElementById('toggleFavsViewBtn');
  if (showFavoritesOnly) {
    btn.innerHTML = '🤍 All';
  } else {
    btn.innerHTML = '❤️ Fav ';
  }
  renderMenu();
});

async function fetchMenu(category) {
  document.getElementById('menuGrid').innerHTML = `
    <div class="card skeleton grid-loading"></div>
    <div class="card skeleton grid-loading"></div>
    <div class="card skeleton grid-loading"></div>`;

  try {
    menuCache = await apiFetch(`/api/menu?category=${encodeURIComponent(category)}`);
    renderMenu();
  } catch (err) {
    showToast(err.message, 'error');
    document.getElementById('menuGrid').innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state__icon">⚠️</div>
        <div class="empty-state__title">Couldn't load the menu</div>
        <p class="text-muted">${escapeHtml(err.message)}</p>
      </div>`;
  }
}

function addToCart(id) {
  const item = menuCache.find(i => i._id === id);
  if (!item || item.quantity <= 0) return;

  const existing = cart.find(i => i._id === id);
  if (existing) {
    existing.cartQuantity += 1;
  } else {
    cart.push({ ...item, cartQuantity: 1 });
  }
  updateCartUI();
  renderMenu();
}

function changeQuantity(id, delta) {
  const item = cart.find(i => i._id === id);
  const menuItem = menuCache.find(i => i._id === id);
  if (!item) return;

  if (delta > 0 && menuItem && item.cartQuantity >= menuItem.quantity) {
    showToast(`Only ${menuItem.quantity} of "${menuItem.name}" available.`, 'error');
    return;
  }

  item.cartQuantity += delta;
  if (item.cartQuantity <= 0) {
    cart = cart.filter(i => i._id !== id);
  }
  updateCartUI();
  renderMenu();
}

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('loggedInUserEmail');
  // Dynamic navigation routing handling fallback mechanism for strict mobile web containers
  window.location.replace('../index.html');
});

(async () => {
  const socket = await connectCanteenSocket({ role: 'student', email: currentUser });
  if (socket) {
    socket.on('menu:update', () => fetchMenu(currentCategory));
  }
})();

renderTabs();
updateCartUI();
fetchMenu(currentCategory);
</script>
</body>
</html>
