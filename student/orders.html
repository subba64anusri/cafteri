<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Orders · Cafteri</title>
<link rel="stylesheet" href="../public/css/canteen.css">
<style>
  :root {
    --accent: #1f8a57;
    --accent-dark: #176e45;
    --accent-soft: rgba(31, 138, 87, 0.12);
  }

  body {
    overflow-x: hidden;
  }

  .ticket-rail {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
    background: var(--ink);
  }

  .ticket-rail__brand {
    white-space: nowrap;
  }

  .ticket-rail__actions {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  /* Profile Avatar and Dropdown UI Panel */
  .profile-wrap {
    position: relative;
    display: inline-block;
  }

  .profile-btn {
    background: rgba(250, 247, 240, 0.1);
    border: 1px solid rgba(250, 247, 240, 0.15);
    color: var(--paper);
    width: 34px;
    height: 34px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s ease;
  }

  .profile-btn:hover {
    background: rgba(250, 247, 240, 0.2);
    border-color: var(--accent);
  }

  .profile-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0, 0, 0, 0.6);
    z-index: 2000;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .profile-card-popup {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--radius-lg);
    width: 100%;
    max-width: 360px;
    padding: 28px 24px;
    box-shadow: 0 12px 32px rgba(0,0,0,0.15);
    position: relative;
    text-align: center;
  }

  .profile-card-popup__close {
    position: absolute;
    top: 14px;
    right: 16px;
    background: none;
    border: none;
    font-size: 18px;
    cursor: pointer;
    color: var(--muted);
  }

  .profile-card-popup__avatar {
    width: 60px;
    height: 60px;
    background: var(--accent-soft);
    color: var(--accent-dark);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin: 0 auto 16px;
  }

  .profile-card-popup h3 {
    font-size: 20px;
    margin-bottom: 4px;
  }

  .profile-card-popup p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 24px;
    word-break: break-all;
  }

  .shell__header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }

  @media (max-width: 580px) {
    .ticket-rail__actions .btn-sm {
      padding: 6px 8px;
      font-size: 12px;
    }
  }

  @media (max-width: 480px) {
    .shell__header {
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>
<body>

<div class="ticket-rail">
  <div class="ticket-rail__brand">🍽️ Cafteri <span class="ticket-rail__role">Student</span></div>
  <div class="ticket-rail__actions">
    <a href="dashboard.html" class="btn btn-ghost btn-sm">Menu</a>
    <a href="cart.html" class="btn btn-ghost btn-sm">Cart</a>
    
    <!-- Aligned Profile Widget Anchor Trigger Container -->
    <div class="profile-wrap">
      <button class="profile-btn" id="profileModalTrigger" title="View Profile">👤</button>
    </div>
  </div>
</div>

<!-- Modal Profile View Layout Container -->
<div class="profile-modal" id="profileOverlayContainer">
  <div class="profile-card-popup">
    <button class="profile-card-popup__close" id="profileCloseBtn">&times;</button>
    <div class="profile-card-popup__avatar">👤</div>
    <h3 id="displayProfileName">Student Account</h3>
    <p id="displayProfileEmail">loading-session@college.edu</p>
    <button class="btn btn-danger btn-block" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="shell">
  <div class="shell__header">
    <div>
      <div class="eyebrow">Live status</div>
      <h1>My Orders</h1>
    </div>
  </div>

  <div class="grid grid--auto" id="ordersContainer">
    <div class="card skeleton" style="height: 180px;"></div>
  </div>
</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/shared.js"></script>
<script>
const currentUser = localStorage.getItem('loggedInUserEmail');
if (!currentUser) {
  window.location.href = 'login.html';
}

// Map profile fields into view containers
document.getElementById('displayProfileEmail').textContent = currentUser;
if (currentUser.includes('@')) {
  const accountPrefixName = currentUser.split('@')[0];
  document.getElementById('displayProfileName').textContent = accountPrefixName.charAt(0).toUpperCase() + accountPrefixName.slice(1);
}

// Modal interactivity listeners
const profileTrigger = document.getElementById('profileModalTrigger');
const profileOverlay = document.getElementById('profileOverlayContainer');
const profileClose = document.getElementById('profileCloseBtn');

profileTrigger.addEventListener('click', () => {
  profileOverlay.style.display = 'flex';
});

profileClose.addEventListener('click', () => {
  profileOverlay.style.display = 'none';
});

profileOverlay.addEventListener('click', (e) => {
  if (e.target === profileOverlay) {
    profileOverlay.style.display = 'none';
  }
});

const STATUS_LABEL = {
  Preparing: { text: '🔔 Preparing', cls: 'status-pill--preparing' },
  Ready: { text: '✅ Ready for pickup', cls: 'status-pill--ready' },
  Completed: { text: '🍽️ Completed', cls: 'status-pill--completed' },
  Cancelled: { text: '✕ Cancelled', cls: 'status-pill--cancelled' }
};

function renderOrders(orders) {
  const container = document.getElementById('ordersContainer');

  if (orders.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state__icon">📦</div>
        <div class="empty-state__title">No orders yet</div>
        <p class="text-muted">When you place an order it'll show up here. <a href="dashboard.html" style="color:var(--accent-dark); font-weight:600;">Go to the menu →</a></p>
      </div>`;
    return;
  }

  container.innerHTML = orders.map(order => {
    const itemsList = order.items.map(i =>
      `${escapeHtml(i.name)} <span class="qty">×${i.cartQuantity}</span>`
    ).join('<br>');
    const status = STATUS_LABEL[order.status] || STATUS_LABEL.Preparing;

    return `
      <div class="ticket" data-order-id="${order._id}">
        <div class="ticket__head">
          <div class="ticket__token">
            #${order.token}
            <span class="ticket__token-label">Token</span>
          </div>
          <span class="status-pill ${status.cls}">${status.text}</span>
        </div>
        <div class="ticket__body">
          <div class="ticket__items">${itemsList}</div>
          <div class="ticket__total">${formatRupees(order.total)}</div>
        </div>
      </div>`;
  }).join('');
}

let ordersCache = [];

async function loadOrders() {
  try {
    ordersCache = await apiFetch(`/api/orders?email=${encodeURIComponent(currentUser)}`);
    renderOrders(ordersCache);
  } catch (err) {
    showToast(err.message, 'error');
    document.getElementById('ordersContainer').innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state__icon">⚠️</div>
        <div class="empty-state__title">Couldn't load your orders</div>
        <p class="text-muted">${escapeHtml(err.message)}</p>
      </div>`;
  }
}

(async () => {
  const socket = await connectCanteenSocket({ role: 'student', email: currentUser });
  if (socket) {
    socket.on('order:status', (updatedOrder) => {
      if (updatedOrder.studentEmail !== currentUser) return;
      const idx = ordersCache.findIndex(o => o._id === updatedOrder._id);
      if (idx >= 0) {
        ordersCache[idx] = updatedOrder;
      } else {
        ordersCache.unshift(updatedOrder);
      }
      renderOrders(ordersCache);
      if (updatedOrder.status === 'Ready') {
        showToast(`Order #${updatedOrder.token} is ready for pickup!`);
      }
    });
  }
})();

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('loggedInUserEmail');
  window.location.href = '../index.html';
});

loadOrders();
</script>
</body>
</html>
