<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard · Cafteri</title>
<link rel="stylesheet" href="../public/css/canteen.css">
<style>
  :root {
    --accent: #2b5fd9;
    --accent-dark: #21459c;
    --accent-soft: rgba(43, 95, 217, 0.12);
  }

  .manage-card {
    padding: 26px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .manage-card__icon {
    font-size: 26px;
    margin-bottom: 6px;
  }

  .manage-card p {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 18px;
    line-height: 1.5;
  }
</style>
</head>
<body>

<div class="ticket-rail">
  <div class="ticket-rail__brand">🍽️ Cafteri <span class="ticket-rail__role">Admin</span></div>
  <div class="ticket-rail__actions">
    <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="shell">
  <div class="shell__header">
    <div>
      <div class="eyebrow">Today</div>
      <h1>Overview</h1>
    </div>
  </div>

  <div class="grid grid--3">
    <div class="card stat-card">
      <div class="stat-card__label">Today's revenue</div>
      <div class="stat-card__value" id="revenueText">₹0</div>
    </div>
    <div class="card stat-card">
      <div class="stat-card__label">Today's orders</div>
      <div class="stat-card__value" id="ordersText">0</div>
    </div>
    <div class="card stat-card">
      <div class="stat-card__label">Menu items</div>
      <div class="stat-card__value" id="menuCountText">0</div>
    </div>
  </div>

  <div class="shell__header mt-section">
    <div>
      <div class="eyebrow">Operations</div>
      <h1>Management</h1>
    </div>
  </div>

  <div class="grid grid--3">
    <div class="card card--accent manage-card">
      <div class="manage-card__icon">📋</div>
      <h3>Manage Menu</h3>
      <p>Add, edit, or remove food items. Changes reach every student's screen instantly.</p>
      <a href="menu.html" class="btn btn-primary btn-block">Open</a>
    </div>
    <div class="card card--accent manage-card">
      <div class="manage-card__icon">📊</div>
      <h3>Reports</h3>
      <p>See what's selling, by item and by category, as orders come in.</p>
      <a href="reports.html" class="btn btn-primary btn-block">Open</a>
    </div>
  </div>
</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/shared.js"></script>
<script>
async function loadSummary() {
  try {
    const summary = await apiFetch('/api/reports/summary');
    document.getElementById('revenueText').textContent = formatRupees(summary.revenue);
    document.getElementById('ordersText').textContent = summary.orders;
    document.getElementById('menuCountText').textContent = summary.menuCount;
  } catch (err) {
    showToast(err.message, 'error');
  }
}

(async () => {
  const socket = await connectCanteenSocket({ role: 'admin' });
  if (socket) {
    socket.on('order:new', loadSummary);
    socket.on('order:status', loadSummary);
    socket.on('menu:update', loadSummary);
  }
})();

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('canteenAdminSession');
  window.location.href = 'login.html';
});

loadSummary();
</script>

</body>
</html>
