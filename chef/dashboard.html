<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitchen · Cafteri</title>
<link rel="stylesheet" href="../public/css/canteen.css">
<style>
  :root {
    --accent: #d9622b;
    --accent-dark: #b3531f;
    --accent-soft: rgba(217, 98, 43, 0.12);
  }

  /* Core Responsive Overrides */
  body {
    overflow-x: hidden;
  }

  .ticket-rail {
    display: flex;
    flex-wrap: wrap;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
    padding: 10px 16px;
  }

  .ticket-rail__actions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  .ticket--new {
    animation: ticket-arrive 0.4s ease;
  }

  @keyframes ticket-arrive {
    from { opacity: 0; transform: translateY(-8px) scale(0.98); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  @media (prefers-reduced-motion: reduce) {
    .ticket--new { animation: none; }
  }

  .ticket__body .btn {
    margin-top: 14px;
  }

  .shell__header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-wrap: wrap;
    gap: 12px;
  }

  .ticket__time {
    font-size: 0.85rem;
    color: #666;
    margin-top: 4px;
    font-weight: normal;
  }

  /* Mobile Media Query Optimization */
  @media (max-width: 768px) {
    .shell__header {
      flex-direction: column;
      align-items: flex-start;
    }
    .shell__header .btn {
      width: 100%;
      margin-top: 8px;
    }
  }
</style>
</head>
<body>

<div class="ticket-rail">
  <div class="ticket-rail__brand">👨‍🍳 Cafteri <span class="ticket-rail__role">Chef</span></div>
  <div class="ticket-rail__actions">
    <button class="btn btn-danger btn-sm" id="logoutBtn">Logout</button>
  </div>
</div>

<div class="shell">
  <div class="shell__header">
    <div>
      <div class="eyebrow">Kitchen pass</div>
      <h1 id="viewTitle">Incoming Orders</h1>
    </div>
    <button class="btn btn-outline btn-sm" id="toggleHistoryBtn">📋 View History</button>
  </div>

  <div id="dashboardViewWrapper" style="margin-top: 20px;">
    <div class="grid grid--auto" id="ordersContainer">
      <div class="card skeleton" style="height: 160px;"></div>
    </div>
  </div>
</div>

<script src="../public/js/config.js"></script>
<script src="../public/js/shared.js"></script>
<script>
let activeOrders = [];
let completedOrders = [];
let currentView = 'active';

function renderOrders(highlightId) {
  const container = document.getElementById('ordersContainer');
  
  let ordersToRender = [];
  if (currentView === 'active') {
    ordersToRender = activeOrders;
  } else {
    ordersToRender = completedOrders;
  }

  if (ordersToRender.length === 0) {
    container.innerHTML = `
      <div class="empty-state" style="grid-column: 1/-1;">
        <div class="empty-state__icon">🧾</div>
        <div class="empty-state__title">${currentView === 'active' ? 'No pending orders' : "No history for today"}</div>
        <p class="text-muted">${currentView === 'active' ? 'New tickets will appear here the moment they\'re placed.' : "Completed tickets for today will appear here."}</p>
      </div>`;
    return;
  }

  container.innerHTML = ordersToRender.map(order => {
    const itemsList = order.items.map(i =>
      `${escapeHtml(i.name)} <span class="qty">×${i.cartQuantity}</span>`
    ).join('<br>');
    const isReady = order.status === 'Ready';
    const isCompleted = order.status === 'Completed';

    let actionButton = '';
    if (!isCompleted) {
      actionButton = isReady
        ? `<button class="btn btn-outline btn-block" data-complete="${order._id}">Mark picked up</button>`
        : `<button class="btn btn-primary btn-block" data-ready="${order._id}">Mark ready ✔</button>`;
    }

    let statusLabel = `🔔 Preparing`;
    if (isReady) statusLabel = `✅ Ready`;
    if (isCompleted) statusLabel = `📦 Done`;

    let orderTimeStr = '';
    if (order.createdAt) {
      const orderDate = new Date(order.createdAt);
      orderTimeStr = orderDate.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    return `
      <div class="ticket ${order._id === highlightId ? 'ticket--new' : ''}">
        <div class="ticket__head">
          <div class="ticket__token">
            #${order.token}
            <div class="ticket__time">${orderTimeStr}</div>
          </div>
          <span class="status-pill ${isReady ? 'status-pill--ready' : (isCompleted ? 'status-pill--ready' : 'status-pill--preparing')}">
            ${statusLabel}
          </span>
        </div>
        <div class="ticket__body">
          <div class="ticket__items">${itemsList}</div>
          ${actionButton}
        </div>
      </div>`;
  }).join('');

  if (currentView === 'active') {
    container.querySelectorAll('[data-ready]').forEach(btn => {
      btn.addEventListener('click', () => setStatus(btn.dataset.ready, 'Ready'));
    });
    container.querySelectorAll('[data-complete]').forEach(btn => {
      btn.addEventListener('click', () => setStatus(btn.dataset.complete, 'Completed'));
    });
  }
}

async function loadActiveOrders() {
  try {
    activeOrders = await apiFetch('/api/orders/active');
    if (currentView === 'active') {
      renderOrders();
    }
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function loadTodayCompletedOrders() {
  try {
    const allCompleted = await apiFetch('/api/orders?status=Completed');
    
    // Establish dynamic target timestamps for today's midnight boundaries
    const startOfToday = new Date();
    startOfToday.setHours(0, 0, 0, 0);

    const endOfToday = new Date();
    endOfToday.setHours(23, 5, 59, 999);

    // Filters for records created inside the today window
    completedOrders = allCompleted.filter(order => {
      if (!order.createdAt) return false;
      const oDate = new Date(order.createdAt);
      return oDate >= startOfToday && oDate <= endOfToday;
    });

    if (currentView === 'completed') {
      renderOrders();
    }
  } catch (err) {
    showToast(err.message, 'error');
  }
}

async function setStatus(orderId, status) {
  try {
    const updated = await apiFetch(`/api/orders/${orderId}/status`, {
      method: 'PUT',
      body: JSON.stringify({ status })
    });

    if (status === 'Completed') {
      activeOrders = activeOrders.filter(o => o._id !== orderId);
    } else {
      const idx = activeOrders.findIndex(o => o._id === orderId);
      if (idx >= 0) activeOrders[idx] = updated;
    }
    renderOrders();
  } catch (err) {
    showToast(err.message, 'error');
  }
}

document.getElementById('toggleHistoryBtn').addEventListener('click', async function() {
  if (currentView === 'active') {
    currentView = 'completed';
    this.innerText = '📥 View Active';
    document.getElementById('viewTitle').innerText = "Today's History";
    await loadTodayCompletedOrders();
  } else {
    currentView = 'active';
    this.innerText = '📋 View History';
    document.getElementById('viewTitle').innerText = 'Incoming Orders';
    renderOrders();
  }
});

(async () => {
  const socket = await connectCanteenSocket({ role: 'chef' });
  if (socket) {
    socket.on('order:new', (order) => {
      activeOrders.push(order);
      if (currentView === 'active') {
        renderOrders(order._id);
      }
      showToast(`New order — token #${order.token}`);
    });
    socket.on('order:status', (updatedOrder) => {
      if (updatedOrder.status === 'Completed' || updatedOrder.status === 'Cancelled') {
        activeOrders = activeOrders.filter(o => o._id !== updatedOrder._id);
      } else {
        const idx = activeOrders.findIndex(o => o._id === updatedOrder._id);
        if (idx >= 0) activeOrders[idx] = updatedOrder;
      }
      renderOrders();
    });
  }
})();

document.getElementById('logoutBtn').addEventListener('click', () => {
  localStorage.removeItem('canteenChefSession');
  window.location.href = 'login.html';
});

loadActiveOrders();
</script>
</body>
</html>
